syntax = "proto3";

package authpb;

option go_package = "github.com/alexey-dobry/medical-service/internal/pkg/gen/auth/authpb";

import "google/protobuf/empty.proto";

service User {
  rpc CreateDoctor (CreateDoctorRequest) returns (google.protobuf.Empty);
  rpc DeleteDoctor (DeleteDoctorRequest) returns (google.protobuf.Empty);
}

message CreateDoctorRequest {
  string first_name = 1;
  string middle_name = 2;
  string last_name = 3;
  string phone = 4;
  string email = 5;
  string sex = 6;
  string birth_date = 7;
  string specialty = 8;
  string work_experience = 9;
  string description = 10;
}

message DeleteDoctorRequest {
  string user_id = 1;
}