syntax = "proto3";

package authpb;

option go_package = "github.com/alexey-dobry/medical-service/internal/pkg/gen/auth/authpb";

import "google/protobuf/empty.proto";

service Auth {
  rpc RegisterDoctor (RegisterRequest) returns (google.protobuf.Empty);
}

message RegisterRequest {
  UserData user_data = 1;
  DoctorData doctor_data = 2;
}

message UserData {
  string first_name = 1;
  string middle_name = 2;
  string last_name = 3;
  string phone = 4;
  string email = 5;
  string sex = 6;
  string birth_date = 7;
  string password = 8;
}

message DoctorData {
  string specialty = 1;
  string work_experience = 2;
  string description = 3;
}