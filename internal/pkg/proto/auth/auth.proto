syntax = "proto3";

package authpb;

option go_package = "github.com/alexey-dobry/medical-service/internal/pkg/gen/auth/authpb";

import "google/protobuf/empty.proto";

service Auth {
  rpc RegisterPatient (RegisterRequest) returns (RegisterResponse);
  rpc RegisterDoctor (RegisterRequest) returns (google.protobuf.Empty);
}

message RegisterRequest {
  string user_id = 1;
  string email = 2;
  string password = 3;
  string role = 4;
}

message RegisterResponse {
  string access_token = 1;
  string refresh_token = 2;
}